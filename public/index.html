let ckHistory=[];

async function ckSend(){
  const input=$('ck-input');const msg=input.value.trim();if(!msg)return;
  const msgs=$('ck-msgs');
  msgs.innerHTML+=`<div style="background:var(--b3);border-radius:12px 12px 0 12px;padding:10px 12px;margin-bottom:8px;margin-left:40px;color:var(--wt);font-size:12px">${msg}</div>`;
  input.value='';input.disabled=true;
  
  // Show typing indicator
  msgs.innerHTML+=`<div id="ck-typing" style="background:rgba(239,164,32,.04);border-radius:12px 12px 12px 0;padding:10px 12px;margin-bottom:8px;color:var(--gd);font-size:11px;font-style:italic">Coach K is thinking...</div>`;
  msgs.scrollTop=msgs.scrollHeight;

  ckHistory.push({role:'user',content:msg});
  
  let answer='';
  try{
    // Try Claude API first
    const resp=await fetch('/api/coach-k',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system:CK_SYSTEM,
        messages:ckHistory.slice(-6)
      })
    });
    const data=await resp.json();
    answer=data.content?data.content.map(c=>c.text||'').join(''):'';
    if(!answer)throw new Error('empty');
  }catch(e){
    // Fallback to keyword dictionary
    const key=Object.keys(CK_FALLBACK).find(k=>msg.toLowerCase().includes(k));
    answer=key?CK_FALLBACK[key]:"That's a great question! I'd recommend exploring the 12 Engines section of this deck to see each technology demonstrated live. You can also check the Revenue tab for the business model or the $1B Path for the growth roadmap. If you want specifics, try asking me about any engine by name — like 'what is a sure bet?' or 'how does the watch score work?'";
  }
  
  ckHistory.push({role:'assistant',content:answer});
  
  // Remove typing indicator and show answer
  const typing=$('ck-typing');if(typing)typing.remove();
  msgs.innerHTML+=`<div style="background:rgba(239,164,32,.04);border-radius:12px 12px 12px 0;padding:12px 14px;margin-bottom:8px;color:var(--gd2);font-size:12px;line-height:1.6;animation:fu .3s ease">${answer}</div>`;
  msgs.scrollTop=msgs.scrollHeight;
  input.disabled=false;input.focus();
}

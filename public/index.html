H.growth_eng=async()=>{
  // Animate the growth bars
  var months=[100,220,480,1050,2300,5000,10900,23800,52000,80000,95000,102400];
  var barsEl=$('ge-bars');
  if(barsEl){
    barsEl.innerHTML=months.map(function(v,i){
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%"><div id="geb'+i+'" style="width:100%;border-radius:3px 3px 0 0;background:linear-gradient(to top,var(--b4),'+(i<6?'var(--gd)':'var(--gn)')+');height:0;transition:height 1s cubic-bezier(.22,1,.36,1) '+(i*0.15)+'s"></div></div>'
    }).join('');
    // Month labels
    var labelsEl=$('ge-labels');
    if(labelsEl){labelsEl.innerHTML=months.map(function(v,i){return '<div style="flex:1;text-align:center"><div style="font-family:JetBrains Mono;font-size:8px;color:var(--gy)">M'+(i+1)+'</div><div id="gev'+i+'" style="font-family:JetBrains Mono;font-size:8px;color:var(--gn);font-weight:700;opacity:0;transition:opacity .4s">'+(v>=1000?(Math.round(v/1000))+'K':v)+'</div></div>'}).join('')}
    // Trigger bars
    setTimeout(function(){
      months.forEach(function(v,i){
        var bar=$('geb'+i);
        if(bar){var h=Math.max(6,Math.round((v/102400)*185));bar.style.height=h+'px'}
        var lbl=$('gev'+i);
        if(lbl)setTimeout(function(){lbl.style.opacity='1'},i*120+400);
      });
    },300);
    // Count up total
    var totEl=$('ge-total');
    if(totEl){setTimeout(function(){
      var t0=performance.now();
      !function f(n){var p=Math.min((n-t0)/3000,1);var eased=1-Math.pow(1-p,3);totEl.textContent=Math.floor(102400*eased).toLocaleString()+'+';if(p<1)requestAnimationFrame(f);else totEl.textContent='102,400+'}(t0);
    },800)}
  }
  
  // Animate reason cards
  TT.push(setTimeout(function(){var r=$('ge-r1');if(r){r.style.opacity='1';r.style.transform='translateY(0)'}},600));
  TT.push(setTimeout(function(){var r=$('ge-r2');if(r){r.style.opacity='1';r.style.transform='translateY(0)'}},900));
  TT.push(setTimeout(function(){var r=$('ge-r3');if(r){r.style.opacity='1';r.style.transform='translateY(0)'}},1200));
  
  // Animate flywheel ring + nodes
  var ring=$('ge-fly-ring');
  var dot=$('ge-fly-dot');
  var nodesEl=$('ge-fly-nodes');
  if(ring){setTimeout(function(){ring.setAttribute('stroke-dashoffset','0')},500)}
  if(dot){setTimeout(function(){dot.setAttribute('opacity','1')},2000)}
  if(nodesEl){
    var nodes=[
      {icon:'👤',label:'User Joins',c:'var(--gd)',angle:-90},
      {icon:'💰',label:'Makes Money',c:'var(--gn)',angle:-30},
      {icon:'📣',label:'Tells Friends',c:'var(--gd2)',angle:30},
      {icon:'👥',label:'Friends Join',c:'var(--gn)',angle:90},
      {icon:'💵',label:'Earns Commission',c:'var(--pp)',angle:150},
      {icon:'🔄',label:'REPEATS ∞',c:'var(--gn)',angle:210},
    ];
    var cSize=Math.min(480,nodesEl.parentElement.offsetWidth||480);
    var radius=cSize*0.395;var cx=cSize/2;var cy=cSize/2;
    nodes.forEach(function(nd,i){
      TT.push(setTimeout(function(){
        var rad=nd.angle*(Math.PI/180);
        var x=cx+radius*Math.cos(rad);
        var y=cy+radius*Math.sin(rad);
        var div=document.createElement('div');
        div.style.cssText='position:absolute;left:'+x+'px;top:'+y+'px;transform:translate(-50%,-50%);text-align:center;background:var(--b2);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px 14px;min-width:90px;z-index:3;opacity:0;transition:all .5s cubic-bezier(.22,1,.36,1);box-shadow:0 4px 20px rgba(0,0,0,.4)';
        div.innerHTML='<div style="font-size:26px">'+nd.icon+'</div><div style="font-family:JetBrains Mono;font-size:10px;color:'+nd.c+';margin-top:3px;letter-spacing:1px;font-weight:600">'+nd.label+'</div>';
        nodesEl.appendChild(div);
        setTimeout(function(){div.style.opacity='1'},50);
      },i*350+800));
    });
  }
  
  // Animate comparison companies
  var comps=$('ge-comps');
  if(comps){
    var rows=[
      ['Uber','Rider referral credits','$80B+ valuation'],
      ['Airbnb','Host & guest referrals','$75B+ valuation'],
      ['Robinhood','Free stock for referrals','$8B+ (32M users)'],
      ['PayPal','$10 signup bonus','$60B+ valuation'],
      ['Dropbox','Free storage per referral','$8B+ valuation'],
    ];
    rows.forEach(function(r,i){
      TT.push(setTimeout(function(){
        comps.innerHTML+='<div style="padding:10px 14px;font-size:13px;font-weight:500;border-bottom:1px solid rgba(255,255,255,.02);animation:slideR .3s ease">'+r[0]+'</div><div style="padding:10px 14px;font-size:12px;color:var(--gy);text-align:center;border-bottom:1px solid rgba(255,255,255,.02);animation:slideR .3s ease">'+r[1]+'</div><div style="padding:10px 14px;font-size:12px;color:var(--gn2);font-weight:600;text-align:center;border-bottom:1px solid rgba(255,255,255,.02);animation:slideR .3s ease">'+r[2]+'</div>';
      },i*300+2500));
    });
    // SBA row
    TT.push(setTimeout(function(){
      comps.innerHTML+='<div style="padding:12px 14px;font-size:14px;font-weight:700;color:var(--gd);background:rgba(239,164,32,.03);animation:slideR .4s ease">★ SBA</div><div style="padding:12px 14px;font-size:12px;color:var(--gd2);text-align:center;background:rgba(239,164,32,.03);font-weight:600;animation:slideR .4s ease">45-60% commission + money printer product</div><div style="padding:12px 14px;font-size:13px;color:var(--gd);font-weight:700;text-align:center;background:rgba(239,164,32,.03);animation:slideR .4s ease">100K+ users → $1B+</div>';
    },rows.length*300+2800));
  }

  // MILESTONE VALUATION TABLE
  var mileEl=$('ge-mile');
  if(mileEl){
    var milestones=[
      {users:'1,000',rev:'$3.4M',arr:'$3.4M',val:'$30-50M',mult:'15-25×',c:'var(--gd)',w:8},
      {users:'5,000',rev:'$17M',arr:'$17M',val:'$80-150M',mult:'40-75×',c:'var(--gd)',w:20},
      {users:'10,000',rev:'$34M',arr:'$34M',val:'$150-300M',mult:'75-150×',c:'var(--gn)',w:35},
      {users:'25,000',rev:'$85M',arr:'$85M',val:'$300-500M',mult:'150-250×',c:'var(--gn)',w:55},
      {users:'50,000',rev:'$170M',arr:'$170M',val:'$500M-800M',mult:'250-400×',c:'var(--gn)',w:75},
      {users:'100,000',rev:'$340M',arr:'$340M',val:'$1B+',mult:'500×+',c:'var(--gn)',w:100},
    ];
    // Header
    mileEl.innerHTML='<div style="display:grid;grid-template-columns:.8fr .7fr .9fr 1fr .7fr;gap:0;border-bottom:2px solid rgba(255,255,255,.04);padding-bottom:6px;margin-bottom:4px"><div style="font-family:JetBrains Mono;font-size:9px;color:var(--gy);letter-spacing:1px;padding:6px 8px">USERS</div><div style="font-family:JetBrains Mono;font-size:9px;color:var(--gy);letter-spacing:1px;padding:6px 8px;text-align:center">REVENUE</div><div style="font-family:JetBrains Mono;font-size:9px;color:var(--gy);letter-spacing:1px;padding:6px 8px;text-align:center">VALUATION</div><div style="font-family:JetBrains Mono;font-size:9px;color:var(--gy);letter-spacing:1px;padding:6px 8px">GROWTH BAR</div><div style="font-family:JetBrains Mono;font-size:9px;color:var(--gy);letter-spacing:1px;padding:6px 8px;text-align:center">ROI</div></div>';
    milestones.forEach(function(m,i){
      TT.push(setTimeout(function(){
        var isFinal=i===milestones.length-1;
        var rowStyle=isFinal?'background:rgba(239,164,32,.03);border:1px solid rgba(239,164,32,.06);border-radius:8px;margin-top:4px':'border-bottom:1px solid rgba(255,255,255,.03)';
        var row=document.createElement('div');
        row.style.cssText='display:grid;grid-template-columns:.8fr .7fr .9fr 1fr .7fr;gap:0;'+rowStyle+';opacity:0;transform:translateX(-12px);transition:all .4s';
        row.innerHTML='<div style="padding:10px 8px;font-size:14px;font-weight:'+(isFinal?'700':'500')+';color:'+(isFinal?'var(--gd)':'var(--wt)')+'">'+m.users+'</div><div style="padding:10px 8px;font-size:13px;text-align:center;color:var(--gy)">'+m.rev+'</div><div style="padding:10px 8px;font-size:14px;text-align:center;font-weight:700;color:'+m.c+'">'+m.val+'</div><div style="padding:10px 8px;display:flex;align-items:center"><div style="height:8px;border-radius:4px;background:'+m.c+';width:0;transition:width 1s cubic-bezier(.22,1,.36,1)" id="gebar'+i+'"></div></div><div style="padding:10px 8px;font-size:13px;text-align:center;font-family:JetBrains Mono;font-weight:700;color:'+m.c+'">'+m.mult+'</div>';
        mileEl.appendChild(row);
        setTimeout(function(){row.style.opacity='1';row.style.transform='translateX(0)';var bar=$('gebar'+i);if(bar)setTimeout(function(){bar.style.width=m.w+'%'},100)},50);
        // Update the ROI counter on final row
        if(isFinal){
          setTimeout(function(){
            var roiEl=$('ge-roi');var roiX=$('ge-roi-x');
            if(roiEl){var t0=performance.now();!function f(n){var p=Math.min((n-t0)/2000,1);var eased=1-Math.pow(1-p,3);roiEl.textContent='$'+Math.floor(1000000000*eased).toLocaleString();if(p<1)requestAnimationFrame(f);else{roiEl.textContent='$1,000,000,000+';roiEl.style.textShadow='0 0 40px rgba(239,164,32,.2)'}}(t0)}
            if(roiX){setTimeout(function(){roiX.textContent='500×+ RETURN ON $2M INVESTMENT';roiX.style.color='var(--gd)'},2200)}
          },400);
        }
      },i*350+4500));
    });
  }
};

let ckHistory=[];

async function ckSend(){
  const input=$('ck-input');const msg=input.value.trim();if(!msg)return;
  const msgs=$('ck-msgs');
  msgs.innerHTML+=`<div style="background:var(--b3);border-radius:12px 12px 0 12px;padding:10px 12px;margin-bottom:8px;margin-left:40px;color:var(--wt);font-size:12px">${msg}</div>`;
  input.value='';input.disabled=true;
  
  // Show typing indicator
  msgs.innerHTML+=`<div id="ck-typing" style="background:rgba(239,164,32,.04);border-radius:12px 12px 12px 0;padding:10px 12px;margin-bottom:8px;color:var(--gd);font-size:11px;font-style:italic">Coach K is thinking...</div>`;
  msgs.scrollTop=msgs.scrollHeight;

  ckHistory.push({role:'user',content:msg});
  
  let answer='';
  try{
    // Try Claude API first
    const resp=await fetch('/api/coach-k',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system:CK_SYSTEM,
        messages:ckHistory.slice(-6)
      })
    });
    const data=await resp.json();
    answer=data.content?data.content.map(c=>c.text||'').join(''):'';
    if(!answer)throw new Error('empty');
  }catch(e){
    // Fallback to keyword dictionary — normalize input
    const clean=msg.toLowerCase().replace(/[^a-z0-9 ]/g,'');
    const cleanNoSpace=clean.replace(/\s+/g,'');
    const key=Object.keys(CK_FALLBACK).find(k=>clean.includes(k)||cleanNoSpace.includes(k));
    if(key){answer=CK_FALLBACK[key]}
    else if(clean.includes('vs')||clean.includes('compar')||clean.includes('better')||clean.includes('differ')){answer=CK_FALLBACK['compare']}
    else if(clean.includes('safe')||clean.includes('risky')){answer=CK_FALLBACK['risk']}
    else if(clean.includes('much')||clean.includes('earn')||clean.includes('make')){answer=CK_FALLBACK['money']}
    else if(clean.includes('engine')||clean.includes('product')){answer=CK_FALLBACK['patent']}
    else if(clean.includes('who')){answer=CK_FALLBACK['team']}
    else if(clean.includes('why')){answer="SBA exists because different sportsbooks price the same events differently. That gap — invisible to most people — is a mathematical certainty of profit when you bet both sides. SBA's 12 engines find, analyze, execute, and protect these opportunities automatically. No other platform comes close to this level of technology."}
    else if(clean.includes('hello')||clean.includes('hi ')||clean.includes('hey')||cleanNoSpace==='hi'){answer="Hey! Great to have you here. I know everything about SBA's 12 engines, the Farr family legacy, and the investment opportunity. What would you like to know? Try asking about any engine, how users make money, or how SBA compares to the competition."}
    else{answer="Great question! Here's what I can help with: ask me about any of SBA's 12 engines (Sure Bet, Value Bet, Middle Bet, Power Play, War Room, AI Synthesis, and more), the Farr family legacy, how users earn money, how SBA compares to OddsJam, or the investment opportunity. What interests you most?"}
  }
  
  ckHistory.push({role:'assistant',content:answer});
  
  // Remove typing indicator and show answer
  const typing=$('ck-typing');if(typing)typing.remove();
  msgs.innerHTML+=`<div style="background:rgba(239,164,32,.04);border-radius:12px 12px 12px 0;padding:12px 14px;margin-bottom:8px;color:var(--gd2);font-size:12px;line-height:1.6;animation:fu .3s ease">${answer}</div>`;
  msgs.scrollTop=msgs.scrollHeight;
  input.disabled=false;input.focus();
}
